name: Rust
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ windows-2022, windows-2025-vs2026, ubuntu-22.04, ubuntu-24.04, macos-15, macos-26 ]

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install prereqs
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install libfontconfig-dev
      if: matrix.os == 'ubuntu-24.04'  #Ugly hack, hopefully temporary
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
